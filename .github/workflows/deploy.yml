name: Deploy ENES Tool JS

on:
  push:
    branches: [main]

jobs:
  # ── Frontend → Cloudflare Pages ──────────────────────────────
  deploy-frontend:
    name: Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: question-bank-js
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ── Backend → Azure App Service ──────────────────────────────
  deploy-backend:
    name: Backend → Azure App Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Syntax-check backend Python files
        run: python3 -m py_compile backend/app/main.py backend/app/queries.py backend/app/semantic_search.py backend/app/data_store.py backend/app/vol_a.py

      - name: Create deployment zip
        run: |
          python3 -c "
          import zipfile, os

          text_files = {
              'startup.sh': 'startup.sh',
              'backend/__init__.py': 'backend/__init__.py',
              'backend/app/__init__.py': 'backend/app/__init__.py',
              'backend/app/main.py': 'backend/app/main.py',
              'backend/app/queries.py': 'backend/app/queries.py',
              'backend/app/semantic_search.py': 'backend/app/semantic_search.py',
              'backend/app/data_store.py': 'backend/app/data_store.py',
              'backend/app/vol_a.py': 'backend/app/vol_a.py',
          }
          import glob
          binary_files = {
              'data/SUPERDATASETCLEANED.xlsx': 'data/SUPERDATASETCLEANED.xlsx',
              'data/semantic_index.npz': 'data/semantic_index.npz',
              'data/term_embeddings.npz': 'data/term_embeddings.npz',
          }
          for fpath in glob.glob('data/vol_a/*.xlsx'):
              arc = fpath.replace(os.sep, '/')
              binary_files[fpath] = arc

          with zipfile.ZipFile('deploy.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for src, dst in text_files.items():
                  with open(src, 'r', encoding='utf-8') as f:
                      content = f.read()
                  zf.writestr(dst, content.replace('\r\n', '\n'))
              for src, dst in binary_files.items():
                  zf.write(src, dst)
          print('Zip created')
          "

      - name: Disable Oryx build on Azure
        run: |
          az webapp config appsettings set \
            --name question-bank-js \
            --resource-group martina.piccardi_rg_3178 \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name question-bank-js \
            --resource-group martina.piccardi_rg_3178 \
            --src-path deploy.zip \
            --type zip \
            --async false
